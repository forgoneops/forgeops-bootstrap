# Minimal scrape config for the observability stack (see docs/OBSERVABILITY.md).
# Mounted read-only into the prometheus container by docker-compose.yml.
# Not templated/rendered — Docker Compose service discovery means every
# scrape target is reachable by its compose service name on
# forgeops_internal with no host/IP hardcoding needed.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
